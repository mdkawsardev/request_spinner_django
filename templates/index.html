{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'style.css'%}">
</head>
<body>
    <div class="container">
        <form id="myForm" method="post" action="{% url 'your_view_name' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <!-- তোমার ফর্ম ফিল্ড গুলো -->
    <button type="submit" id="submitBtn">Submit</button>
</form>

<div id="loading" style="display: none;" class="loader"><div class="lds-facebook"><div></div><div></div><div></div></div></div>
<div id="successMessage" class="success" style="display: none;">
    <div class="success-animation" >
<svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"><circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none" /><path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" /></svg>
</div>
</div>
<div id="errorMessage" style="display: none; color: red;">Submission failed. Please try again.</div>
    </div>

<script>
    document.getElementById('myForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ফর্ম সাবমিট ডিফল্ট বন্ধ করো
        document.getElementById('loading').style.display = 'block'; // লোডিং দেখাও
        document.getElementById('submitBtn').disabled = true; // বাটন ডিসেবল করো

        // ফর্ম ডেটা AJAX দিয়ে পাঠাও
        fetch("{% url 'your_view_name' %}", {
            method: 'POST',
            body: new FormData(this),
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
                document.getElementById('submitBtn').disabled = false;
                this.reset(); // ফর্ম রিসেট করো
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
            }
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('submitBtn').disabled = false;
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="{% static 'scripts.js' %}"></script>
</body>
</html>
